<!doctype html>
<html lang="{{ language }}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }}</title>
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
                Helvetica, Arial, sans-serif;
        "
    >
        <table
            width="100%"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="background-color: #f5f5f5; padding: 20px 0"
        >
            <tr>
                <td align="center" style="padding: 20px">
                    <table
                        width="100%"
                        cellpadding="0"
                        cellspacing="0"
                        border="0"
                        style="
                            max-width: 480px;
                            width: 100%;
                            background-color: #ffffff;
                            border-radius: 12px;
                            border: 1px solid #e8e8e8;
                        "
                    >
                        <tr>
                            <td style="padding: 48px 40px; text-align: center">
                                <table
                                    width="100%"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                >
                                    <tr>
                                        <td
                                            style="
                                                font-size: 16px;
                                                line-height: 1.7;
                                                color: #1a1a1a;
                                                padding-bottom: 36px;
                                                text-align: center;
                                            "
                                        >
                                            {{ description }}
                                        </td>
                                    </tr>
                                </table>

                                <table
                                    width="100%"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                >
                                    <tr>
                                        <td align="center">
                                            <a
                                                href="{{ link }}"
                                                target="_blank"
                                                style="
                                                    display: inline-block;
                                                    background-color: #000000;
                                                    color: #ffffff;
                                                    font-weight: 600;
                                                    font-size: 15px;
                                                    padding: 14px 40px;
                                                    border: 2px solid #000000;
                                                    border-radius: 40px;
                                                    text-decoration: none;
                                                    letter-spacing: 0.5px;
                                                    text-transform: uppercase;
                                                    font-family:
                                                        -apple-system,
                                                        BlinkMacSystemFont,
                                                        &quot;Segoe UI&quot;,
                                                        Roboto, Helvetica,
                                                        Arial, sans-serif;
                                                "
                                            >
                                                ПОДТВЕРДИТЬ
                                            </a>
                                        </td>
                                    </tr>
                                </table>

                                <table
                                    width="100%"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    style="
                                        margin-top: 28px;
                                        border-top: 1px solid #ececec;
                                        padding-top: 22px;
                                    "
                                >
                                    <tr>
                                        <td
                                            style="
                                                font-size: 13px;
                                                color: #888888;
                                                text-align: center;
                                            "
                                        >
                                            Если у вас возникли вопросы,
                                            напишите на
                                            <a
                                                href="mailto:fitnear@mail.ru"
                                                style="color: #000000"
                                                >fitnear@mail.ru</a
                                            >
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
